name: voice_agent
description: Offline-first voice-to-text app that sends transcripts to your API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  record: ^6.0.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.2.4
  vad: ^0.0.7
  flutter_tts: ^4.2.5
  audioplayers: ^6.0.0
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4+4

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/silero_vad_v5.onnx
    - assets/audio/
